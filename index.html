<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm PRO - Sistema de Controle de Rebanho</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-leaf"></i>
                    <span>Farm PRO</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <a href="#dashboard" class="nav-item active" data-page="dashboard">
                    <i class="fas fa-th"></i>
                    <span>Dashboard</span>
                </a>
                
                <!-- Rebanho Section -->
                <div class="nav-section-collapsible">
                    <button class="nav-section-title" onclick="toggleNavSection(this)">
                        <span>Rebanho</span>
                        <i class="fas fa-chevron-right"></i>
                    </button>
                    <div class="nav-section-items">
                        <a href="#animals" class="nav-item" data-page="animals">
                            <i class="fas fa-cow"></i>
                            <span>Animais</span>
                        </a>
                        <a href="#weight" class="nav-item" data-page="weight">
                            <i class="fas fa-weight"></i>
                            <span>Pesos</span>
                        </a>
                        <a href="#vaccines" class="nav-item" data-page="vaccines">
                            <i class="fas fa-syringe"></i>
                            <span>Vacinas</span>
                        </a>
                        <a href="#events" class="nav-item" data-page="events">
                            <i class="fas fa-calendar-alt"></i>
                            <span>Eventos</span>
                        </a>
                    </div>
                </div>

                <!-- Análise Section -->
                <div class="nav-section-collapsible">
                    <button class="nav-section-title" onclick="toggleNavSection(this)">
                        <span>Análise</span>
                        <i class="fas fa-chevron-right"></i>
                    </button>
                    <div class="nav-section-items">
                        <a href="#insights" class="nav-item" data-page="insights">
                            <i class="fas fa-chart-line"></i>
                            <span>Gráficos</span>
                        </a>
                        <a href="#weight-comparison" class="nav-item" data-page="weight-comparison">
                            <i class="fas fa-chart-bar"></i>
                            <span>Comparativo</span>
                        </a>
                        <a href="#profit-simulator" class="nav-item" data-page="profit-simulator">
                            <i class="fas fa-calculator"></i>
                            <span>Simulador</span>
                        </a>
                    </div>
                </div>

                <!-- Cadastros Section -->
                <div class="nav-section-collapsible">
                    <button class="nav-section-title" onclick="toggleNavSection(this)">
                        <span>Cadastros</span>
                        <i class="fas fa-chevron-right"></i>
                    </button>
                    <div class="nav-section-items">
                        <a href="#producers" class="nav-item" data-page="producers">
                            <i class="fas fa-user-tie"></i>
                            <span>Produtores</span>
                        </a>
                        <a href="#clients" class="nav-item" data-page="clients">
                            <i class="fas fa-users"></i>
                            <span>Clientes</span>
                        </a>
                        <a href="#suppliers" class="nav-item" data-page="suppliers">
                            <i class="fas fa-truck"></i>
                            <span>Fornecedores</span>
                        </a>
                    </div>
                </div>

                <!-- Operações Section -->
                <div class="nav-section-collapsible">
                    <button class="nav-section-title" onclick="toggleNavSection(this)">
                        <span>Operações</span>
                        <i class="fas fa-chevron-right"></i>
                    </button>
                    <div class="nav-section-items">
                        <a href="#incoming-notes" class="nav-item" data-page="incoming-notes">
                            <i class="fas fa-file-import"></i>
                            <span>Notas Entrada</span>
                        </a>
                        <a href="#sales-contracts" class="nav-item" data-page="sales-contracts">
                            <i class="fas fa-file-contract"></i>
                            <span>Contratos</span>
                        </a>
                        <a href="#nfe-operations" class="nav-item" data-page="nfe-operations">
                            <i class="fas fa-receipt"></i>
                            <span>NF-e</span>
                        </a>
                    </div>
                </div>

                <!-- Ferramentas Section -->
                <div class="nav-section-collapsible">
                    <button class="nav-section-title" onclick="toggleNavSection(this)">
                        <span>Ferramentas</span>
                        <i class="fas fa-chevron-right"></i>
                    </button>
                    <div class="nav-section-items">
                        <a href="#search" class="nav-item" data-page="search">
                            <i class="fas fa-search"></i>
                            <span>Busca</span>
                        </a>
                        <a href="#reports" class="nav-item" data-page="reports">
                            <i class="fas fa-file-pdf"></i>
                            <span>Relatórios</span>
                        </a>
                        <a href="#alerts" class="nav-item" data-page="alerts">
                            <i class="fas fa-bell"></i>
                            <span>Alertas</span>
                        </a>
                    </div>
                </div>
            </nav>

            <div class="sidebar-footer">
                <a href="#settings" class="nav-item" data-page="settings">
                    <i class="fas fa-cog"></i>
                    <span>Configurações</span>
                </a>
                <a href="#profile" class="nav-item" data-page="profile">
                    <i class="fas fa-user"></i>
                    <span>Perfil</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <button class="sidebar-toggle" id="sidebarToggleMobile" style="display: none; background: none; border: none; font-size: 24px; color: var(--text-primary); cursor: pointer;">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Buscar...">
                </div>
                <div class="top-bar-actions">
                    <button class="notification-btn">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge">0</span>
                    </button>
                    <div class="user-profile">
                        <div class="avatar">JS</div>
                        <span class="user-name">João Silva</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
            </div>

            <!-- Page Content -->
            <div class="page-content">
                <div class="content-main"></div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script src="pages.js"></script>
    <script src="script.js"></script>
</body>
</html>
